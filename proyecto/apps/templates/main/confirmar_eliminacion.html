{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger shadow">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0">Confirmar Eliminación</h5>
                </div>
                <div class="card-body text-center py-4">
                    <p>¿Estás seguro de que deseas eliminar el producto:</p>
                    <h3 class="text-dark">{{ producto.nombre }}?</h3>
                    <p>Esta acción no se puede deshacer en la base de datos PostgreSQL.</p>
                    
                    <form method="POST" class="mt-4">
                        {% csrf_token %}
                        <div class="d-grid gap-2 d-md-block">
                            <button type="submit" class="btn btn-danger px-4">Eliminar producto</button>
                            <a href="{% url 'listar_producto' %}" class="btn btn-light px-4">Cancelar y volver</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
