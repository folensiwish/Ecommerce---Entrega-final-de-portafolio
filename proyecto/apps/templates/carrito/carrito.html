{% extends 'base.html'%}

{% block content%}
<div class="table-responsive">
    <table class="table table-hover">
        <thead>
            <tr>
                <th scope="col">Nombre</th>
                <th scope="col">Precio</th>
                <th scope="col">Cantidad</th>
                <th scope="col">Subtotal</th>
            </tr>
        </thead>
        <tbody>
            <tr>

                {% for i in carrito_prod%}
                    <td>{{i.nombre}}</td>
                    <td>Amigo</td>
                    <td>Otto</td>
                    <td>@mdo</td>
                {%endfor%}
            </tr>
        </tbody>
        <tfoot>
            <td>Total</td>
        </tfoot>
    </table>
</div>
{% endblock%}
